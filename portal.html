function getPkg(id){for(var i=0;i<state.erpPackages.length;i++)if(state.erpPackages[i].id===id)return state.erpPackages[i];return null;}
SX.savePackage=function(){readDraftInputs();var k=EUI.builderDraft;if(!k.name||!k.name.trim()){toast('Package name required');return;}
  if(k.id){var orig=getPkg(k.id);
    if(orig){state.pkgVersions.unshift({id:uid(),packageId:k.id,version:orig.version||1,snapshot:JSON.stringify(orig),date:Date.now(),by:whoami()});savePkgVer();
      k.version=(orig.version||1)+1;for(var key in k)orig[key]=k[key];}
  }else{k.id=uid();k.version=1;k.created=Date.now();state.erpPackages.unshift(k);}
  saveErpPkgs();EUI.builderDraft=null;toast('Package saved');cascade();};
SX.delPackage=function(id){var k=getPkg(id);if(!k)return;openModal('Delete Package',I.trash,'<p style="color:var(--ink-2)">Delete <b style="color:var(--ink)">'+esc(k.name)+'</b>?</p>',[['Delete','btn','SX.delPackageGo(\''+id+'\')']]);};
SX.delPackageGo=function(id){state.erpPackages=state.erpPackages.filter(function(k){return k.id!==id;});saveErpPkgs();closeModal();toast('Package deleted');cascade();};
SX.dupPackage=function(id){var k=getPkg(id);if(!k)return;var c=JSON.parse(JSON.stringify(k));c.id=uid();c.name=k.name+' (copy)';c.version=1;c.created=Date.now();state.erpPackages.unshift(c);saveErpPkgs();toast('Package duplicated');cascade();};
SX.pkgVersions=function(id){var k=getPkg(id);if(!k)return;var vs=state.pkgVersions.filter(function(x){return x.packageId===id;});
  var body=vs.length?vs.map(function(x){var snap=JSON.parse(x.snapshot);var r=pkgCompute(snap);return '<div class="hist-row"><div><b>v'+x.version+'</b> · '+fmtNice(new Date(x.date))+' · <span class="muted">'+esc(x.by)+'</span><div class="muted">Selling '+peso(r.fin)+' · '+snap.items.length+' items</div></div><div><button class="btn sm" onclick="SX.restoreVersion(\''+id+'\',\''+x.id+'\')">Restore</button></div></div>';}).join(''):'<div class="empty">No previous versions. Versions are saved each time you edit a package.</div>';
  openModal('Version History — '+esc(k.name),I.hist,body,null);};
SX.restoreVersion=function(pkgId,verId){var k=getPkg(pkgId);var vr=null;for(var i=0;i<state.pkgVersions.length;i++)if(state.pkgVersions[i].id===verId)vr=state.pkgVersions[i];if(!k||!vr)return;
  state.pkgVersions.unshift({id:uid(),packageId:pkgId,version:k.version||1,snapshot:JSON.stringify(k),date:Date.now(),by:whoami()});
  var snap=JSON.parse(vr.snapshot);snap.id=pkgId;snap.version=(k.version||1)+1;for(var key in snap)k[key]=snap[key];
  saveErpPkgs();savePkgVer();closeModal();toast('Restored to v'+vr.version);cascade();};
SX.printPackage=function(id){var k=getPkg(id);if(!k)return;var r=pkgCompute(k);
  var items=k.items.map(function(it){var p=pById(it.productId);return '<tr><td style="padding:6px 10px;border-bottom:1px solid #ddd">'+(p?esc(p.name):'—')+'</td><td style="padding:6px 10px;border-bottom:1px solid #ddd;text-align:center">'+it.qty+'</td><td style="padding:6px 10px;border-bottom:1px solid #ddd;text-align:right">'+peso(pCost(it.productId))+'</td><td style="padding:6px 10px;border-bottom:1px solid #ddd;text-align:right">'+peso(pCost(it.productId)*it.qty)+'</td></tr>';}).join('');

    '<table style="width:100%;border-collapse:collapse;margin-top:16px;font-size:13px"><thead><tr><th style="text-align:left;padding:6px 10px;border-bottom:2px solid #333">Component</th><th style="padding:6px 10px;border-bottom:2px solid #333">Qty</th><th style="text-align:right;padding:6px 10px;border-bottom:2px solid #333">Unit</th><th style="text-align:right;padding:6px 10px;border-bottom:2px solid #333">Amount</th></tr></thead><tbody>'+items+'</tbody></table>'+
    '<table style="width:300px;margin-left:auto;margin-top:14px;font-size:13px"><tr><td>Material</td><td style="text-align:right">'+peso(r.material)+'</td></tr><tr><td>Total Cost</td><td style="text-align:right">'+peso(r.total)+'</td></tr><tr><td>Tax</td><td style="text-align:right">'+peso(r.tax)+'</td></tr><tr><td>Profit</td><td style="text-align:right">'+peso(r.profit)+'</td></tr><tr><td><b>Selling Price</b></td><td style="text-align:right"><b>'+peso(r.fin)+'</b></td></tr></table></div>';
  printHTML(html);};

   SCHEDULER  (month / week / day + drag-drop)

function ymd(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function pad2(n){return (n<10?'0':'')+n;}
function parseYmd(s){var a=(s||'').split('-');return new Date(+a[0],(+a[1]||1)-1,+a[2]||1);}
function monthName(d){return ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()];}
function fmtNice(d){return monthName(d).slice(0,3)+' '+d.getDate()+', '+d.getFullYear();}
function sameMonth(s){var d=parseYmd(s),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function schedFiltered(){return state.schedules.filter(function(s){
  if(EUI.schInstaller!=='all'&&s.installer!==EUI.schInstaller)return false;
  if(EUI.schStatus!=='all'&&s.status!==EUI.schStatus)return false;
  if(EUI.schSearch){var q=EUI.schSearch.toLowerCase();if((s.customer+' '+s.address+' '+s.installer+' '+s.agent+' '+s.type).toLowerCase().indexOf(q)<0)return false;}
  return true;});}
function installers(){var set={};state.schedules.forEach(function(s){if(s.installer)set[s.installer]=1;});return Object.keys(set);}

function viewScheduler(){
  var instOpt='<option value="all">All installers</option>'+installers().map(function(i){return '<option'+(EUI.schInstaller===i?' selected':'')+'>'+esc(i)+'</option>';}).join('');
  var stOpt='<option value="all">All statuses</option>'+SCHED_STATUS.map(function(s){return '<option'+(EUI.schStatus===s?' selected':'')+'>'+s+'</option>';}).join('');
  var head='<div class="section-head"><h2>Site Visit &amp; Installation Scheduler</h2><div class="sp"></div>'+
    '<button class="btn green sm" onclick="SX.editSchedule(null)">'+svg(I.plus)+'New schedule</button></div>'+
    '<div class="erp-toolbar">'+
      '<div class="seg2">'+seg('month','Month')+seg('week','Week')+seg('day','Day')+'</div>'+
      '<button class="iconbtn" onclick="SX.calNav(-1)">'+svg(I.lft)+'</button>'+
      '<button class="btn sm" onclick="SX.calToday()">Today</button>'+
      '<button class="iconbtn" onclick="SX.calNav(1)">'+svg(I.rgt)+'</button>'+
      '<div class="cal-title" id="cal_title">'+calTitle()+'</div><div class="sp"></div>'+
      '<div class="erp-search"><span></span><input placeholder="Search\u2026" value="'+esc(EUI.schSearch)+'" oninput="SX.schSearch(this.value)" style="min-width:150px"></div>'+
      '<select onchange="SX.schInst(this.value)" style="max-width:160px">'+instOpt+'</select>'+
      '<select onchange="SX.schStat(this.value)" style="max-width:150px">'+stOpt+'</select>'+
    '</div>';
  var body= EUI.calMode==='month'?calMonth():EUI.calMode==='week'?calWeek():calDay();
  return head+body;
  function seg(m,l){return '<button class="'+(EUI.calMode===m?'on':'')+'" onclick="SX.calMode(\''+m+'\')">'+l+'</button>';}
}
function calTitle(){var c=EUI.calCursor;
  if(EUI.calMode==='day')return fmtNice(c);
  if(EUI.calMode==='week'){var s=weekStart(c);var e=new Date(s);e.setDate(e.getDate()+6);return fmtNice(s)+' – '+fmtNice(e);}
  return monthName(c)+' '+c.getFullYear();}
function weekStart(d){var s=new Date(d);s.setDate(s.getDate()-s.getDay());s.setHours(0,0,0,0);return s;}
function evChip(s,draggable){var c=TYC[s.type]||'#3B9AE0';return '<div class="cal-ev" '+(draggable?'draggable="true" ondragstart="SX.dragStart(event,\''+s.id+'\')"':'')+' onclick="event.stopPropagation();SX.editSchedule(\''+s.id+'\')" style="background:'+hexA(c,.22)+';border-left-color:'+c+'" title="'+esc(s.customer+' · '+s.type)+'">'+esc((s.time?s.time+' ':'')+s.customer)+'</div>';}
function hexA(h,a){var n=parseInt(h.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function calMonth(){
  var c=EUI.calCursor,first=new Date(c.getFullYear(),c.getMonth(),1);
  var start=new Date(first);start.setDate(1-first.getDay());
  var dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');
  var cells='';var sched=schedFiltered();var today=ymd(new Date());
  for(var i=0;i<42;i++){var day=new Date(start);day.setDate(start.getDate()+i);var key=ymd(day);var dim=day.getMonth()!==c.getMonth();
    var evs=sched.filter(function(s){return s.date===key;});
    var chips=evs.slice(0,3).map(function(s){return evChip(s,true);}).join('')+(evs.length>3?'<div class="cal-more">+'+(evs.length-3)+' more</div>':'');
    cells+='<div class="cal-cell '+(dim?'dim':'')+(key===today?' today':'')+'" ondragover="event.preventDefault()" ondrop="SX.dropEv(event,\''+key+'\')" onclick="SX.editSchedule(null,\''+key+'\')"><div class="cal-date">'+day.getDate()+'</div>'+chips+'</div>';}
  return '<div class="cal-grid">'+dow+'</div><div class="cal-grid" style="margin-top:6px">'+cells+'</div>';
}
function calWeek(){
  var s=weekStart(EUI.calCursor);var sched=schedFiltered();var cols='';var today=ymd(new Date());
  for(var i=0;i<7;i++){var day=new Date(s);day.setDate(s.getDate()+i);var key=ymd(day);
    var evs=sched.filter(function(x){return x.date===key;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
    cols+='<div class="week-col" ondragover="event.preventDefault()" ondrop="SX.dropEv(event,\''+key+'\')" onclick="SX.editSchedule(null,\''+key+'\')"><h4 style="'+(key===today?'color:var(--green-2)':'')+'">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i]+' '+day.getDate()+'</h4>'+(evs.map(function(e){return evChip(e,true);}).join('')||'<div class="cal-more" style="text-align:center">—</div>')+'</div>';}
  return '<div class="week-grid">'+cols+'</div>';
}
function calDay(){
  var key=ymd(EUI.calCursor);var evs=schedFiltered().filter(function(s){return s.date===key;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
  var list=evs.map(function(s){var c=TYC[s.type]||'#3B9AE0';
    return '<div class="day-item" style="border-left:4px solid '+c+'"><div class="dt-time">'+esc(s.time||'—')+'</div><div class="dt-body"><div class="dt-cust">'+esc(s.customer)+' <span class="st-chip" style="color:'+STC[s.status]+';border-color:'+STC[s.status]+';background:'+hexA(STC[s.status],.12)+'">'+esc(s.status)+'</span></div>'+
      '<div class="dt-meta">'+esc(s.type)+' · '+esc(s.installer||'No installer')+(s.packageSize?' · '+esc(s.packageSize):'')+(s.duration?' · ~'+esc(s.duration):'')+'</div>'+
      '<div class="dt-meta">'+esc(s.address||'')+(s.contact?' · '+esc(s.contact):'')+(s.mapUrl?' · <a href="'+esc(s.mapUrl)+'" target="_blank" style="color:#3B9AE0">Map</a>':'')+'</div></div>'+
      '<div class="row-act"><button class="ibtn" onclick="SX.dupSchedule(\''+s.id+'\')">'+svg(I.copy)+'</button><button class="ibtn" onclick="SX.editSchedule(\''+s.id+'\')">'+svg(I.edit)+'</button><button class="ibtn danger" onclick="SX.delSchedule(\''+s.id+'\')">'+svg(I.trash)+'</button></div></div>';
  }).join('')||'<div class="empty">No visits scheduled for this day.</div>';
  return '<div class="section-head" style="margin-top:4px"><h3 style="margin:0;font-size:16px">'+fmtNice(EUI.calCursor)+'</h3><div class="sp"></div><button class="btn sm" onclick="SX.printDay()">'+svg(I.printr)+'Print day</button></div><div class="day-list">'+list+'</div>';
}

SX.saveSchedule=function(id){var g=function(k){var el=document.getElementById('sf_'+k);return el?el.value:'';};
  if(!g('customer').trim()){toast('Customer name required');return;}
  var rec={customer:g('customer').trim(),contact:g('contact').trim(),address:g('address').trim(),mapUrl:g('mapUrl').trim(),
    installer:g('installer').trim(),agent:g('agent').trim(),type:g('type'),date:g('date')||ymd(new Date()),time:g('time'),
    packageSize:g('packageSize').trim(),duration:g('duration').trim(),status:g('status'),notes:g('notes').trim()};
  if(id){var s=getSched(id);if(s)for(var k in rec)s[k]=rec[k];}else{rec.id=uid();rec.created=Date.now();state.schedules.push(rec);}
  saveSchedules();closeModal();toast('Schedule saved');cascade();};

function viewReports(){
  var types=[['inventory','Inventory Value'],['mostused','Most Used Products'],['pkgcost','Package Cost Analysis'],['material','Material Cost Report'],['profit','Monthly Profit'],['installs','Installation Report']];
  var tabs=types.map(function(t){return '<button class="'+(EUI.reportType===t[0]?'on':'')+'" onclick="SX.report(\''+t[0]+'\')">'+t[1]+'</button>';}).join('');
  return '<div class="section-head"><h2>Reports</h2><div class="sp"></div>'+
    '<button class="btn sm" onclick="SX.exportReport(\'csv\')">'+svg(I.printr)+'CSV</button>'+
    '<button class="btn sm" onclick="SX.exportReport(\'xls\')">Excel</button>'+
    '<button class="btn sm" onclick="SX.exportReport(\'print\')">Print / PDF</button></div>'+
    '<div class="seg2" style="margin-bottom:14px;flex-wrap:wrap">'+tabs+'</div>'+
    '<div class="tbl-wrap" id="report_area">'+reportTable(EUI.reportType)+'</div>';
}
function reportData(type){
  if(type==='inventory')return {head:['Product','Category','Qty','Unit Cost','Stock Value'],rows:activeProducts().map(function(p){return [p.name,p.category,p.qty,p.cost,(+p.cost||0)*(+p.qty||0)];}),money:[3,4]};
  if(type==='mostused'){var cnt={};state.erpPackages.forEach(function(k){(k.items||[]).forEach(function(it){cnt[it.productId]=(cnt[it.productId]||0)+(+it.qty||0);});});
    var rows=Object.keys(cnt).map(function(id){var p=pById(id);return [p?p.name:'(deleted)',p?p.category:'',cnt[id]];}).sort(function(a,b){return b[2]-a[2];});
    return {head:['Product','Category','Total Qty in Packages'],rows:rows,money:[]};}
  if(type==='pkgcost')return {head:['Package','Material','Total Cost','Selling','Net Profit','Margin %'],rows:state.erpPackages.map(function(k){var r=pkgCompute(k);return [k.name,r.material,r.total,r.fin,r.net,num(r.margin,1)];}),money:[1,2,3,4]};
  if(type==='material')return {head:['Category','Items','Total Stock Value'],rows:CATS.map(function(c){var ps=activeProducts().filter(function(p){return p.category===c;});return [c,ps.length,ps.reduce(function(s,p){return s+(+p.cost||0)*(+p.qty||0);},0)];}).filter(function(r){return r[1]>0;}),money:[2]};
  if(type==='profit'){var m={};state.schedules.filter(function(s){return s.status==='Completed';}).forEach(function(s){var d=parseYmd(s.date);var key=d.getFullYear()+'-'+pad2(d.getMonth()+1);m[key]=(m[key]||0)+1;});
    return {head:['Month','Completed Installs'],rows:Object.keys(m).sort().map(function(k){return [k,m[k]];}),money:[]};}
  if(type==='installs')return {head:['Customer','Type','Date','Installer','Status'],rows:state.schedules.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).map(function(s){return [s.customer,s.type,s.date,s.installer,s.status];}),money:[]};
  return {head:[],rows:[],money:[]};
}
function reportTable(type){var d=reportData(type);
  if(!d.rows.length)return '<div class="empty">No data for this report yet.</div>';
  var th='<tr>'+d.head.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr>';
  var tb=d.rows.map(function(r){return '<tr>'+r.map(function(c,i){return '<td'+(d.money.indexOf(i)>=0?' class="mono"':'')+'>'+(d.money.indexOf(i)>=0?peso(c):esc(c))+'</td>';}).join('')+'</tr>';}).join('');
  return '<table class="etbl"><thead>'+th+'</thead><tbody>'+tb+'</tbody></table>';
}
SX.report=function(t){EUI.reportType=t;var a=document.getElementById('report_area');if(a)a.innerHTML=reportTable(t);
  document.querySelectorAll('#v-reports .seg2 button').forEach(function(b){b.classList.toggle('on',b.getAttribute('onclick').indexOf("'"+t+"'")>=0);});};
SX.exportReport=function(fmt){var d=reportData(EUI.reportType);var name='sularex-report-'+EUI.reportType;
  if(fmt==='print'){var th='<tr>'+d.head.map(function(h){return '<th style="text-align:left;padding:6px 10px;border-bottom:2px solid #333">'+h+'</th>';}).join('')+'</tr>';
    var tb=d.rows.map(function(r){return '<tr>'+r.map(function(c,i){return '<td style="padding:6px 10px;border-bottom:1px solid #ddd">'+(d.money.indexOf(i)>=0?peso(c):esc(c))+'</td>';}).join('')+'</tr>';}).join('');
    printHTML('<div style="font-family:Arial;color:#111;padding:24px"><h2 style="margin:0">SULAREX — '+EUI.reportType+' report</h2><table style="width:100%;border-collapse:collapse;margin-top:14px;font-size:13px"><thead>'+th+'</thead><tbody>'+tb+'</tbody></table></div>');return;}
  var rows=[d.head].concat(d.rows).map(function(r){return r.map(csvCell).join(',');}).join('\n');
  if(fmt==='xls'){download(name+'.xls','<table>'+[d.head].concat(d.rows).map(function(r){return '<tr>'+r.map(function(c){return '<td>'+esc(c)+'</td>';}).join('')+'</tr>';}).join('')+'</table>','application/vnd.ms-excel');}
  else download(name+'.csv',rows,'text/csv');
  toast('Report exported');
};

/* ---- shared print helper (matches portal's #print-area mechanism) ---- */

  var bill=billMid(r[3]);var kwh=bill?Math.round(bill/11):0;var rec=r[6]||(kwh?recSizeFromKwh(kwh):'');
  var created=r[8]?Date.parse(r[8])||Date.now():Date.now();
  var st=/convert/i.test(r[7])?'Quotation Sent':'New Inquiry';
  return {id:'CUS-'+String(n).padStart(4,'0'),name:r[0],phone:r[1]||'',altPhone:'',email:(r[2]&&r[2].indexOf('@')>0)?r[2]:'',

    agent:'',installer:'',engineer:'',status:st,notes:[],timeline:[{label:'Inquiry Created',date:created,by:'Facebook Lead',note:r[3]?('Bill: '+r[3]):''}],
    archived:false,created:created};
});}

EUI.invSource='all';
function viewInventory2(){
  var rows=state.products.slice();
  if(EUI.invCat!=='all') rows=rows.filter(function(p){return p.category===EUI.invCat;});
  if(EUI.invSource!=='all') rows=rows.filter(function(p){return p.source===EUI.invSource;});
  if(EUI.invSearch){var q=EUI.invSearch.toLowerCase();rows=rows.filter(function(p){return (p.name+' '+p.brand+' '+p.category+' '+p.source).toLowerCase().indexOf(q)>=0;});}
  if(EUI.invSort==='newest')rows.sort(function(a,b){return b.created-a.created;});
  if(EUI.invSort==='lowcost')rows.sort(function(a,b){return a.cost-b.cost;});
  if(EUI.invSort==='highcost')rows.sort(function(a,b){return b.cost-a.cost;});
  if(EUI.invSort==='brand')rows.sort(function(a,b){return (a.brand||'').localeCompare(b.brand||'');});
  var act=activeProducts();
  var totCost=act.reduce(function(s,p){return s+(+p.cost||0)*(+p.qty||0);},0);
  var totSell=act.reduce(function(s,p){return s+(+p.price||0)*(+p.qty||0);},0);
  var cats=uniqueCats();
  var catOpt='<option value="all">All categories</option>'+cats.map(function(c){return '<option'+(EUI.invCat===c?' selected':'')+'>'+esc(c)+'</option>';}).join('');
  var srcOpt='<option value="all">All suppliers</option>'+state.sources.map(function(c){return '<option'+(EUI.invSource===c?' selected':'')+'>'+esc(c)+'</option>';}).join('');
  var body=rows.map(function(p){var marg=p.price>0?((p.price-p.cost)/p.price*100):0;var sb=stockBadge(p);
    return '<tr class="'+(p.archived?'archived':'')+'">'+
      '<td><div class="nm">'+esc(p.name)+'</div><div class="muted">'+esc(p.brand||'')+(p.category?' · '+esc(p.category):'')+'</div></td>'+
      '<td><span class="src-pill">'+esc(p.source||'—')+'</span></td>'+
      '<td class="mono">'+peso(p.cost)+'</td><td class="mono">'+peso(p.price)+'</td>'+
      '<td class="mono" style="color:var(--green-2)">'+num(marg,0)+'%</td>'+
      '<td>'+sb+'</td>'+
      '<td class="mono">'+peso((+p.cost||0)*(+p.qty||0))+'</td>'+
      '<td><div class="row-act">'+
        '<button class="ibtn" title="Price history" onclick="SX.productHistory(\''+p.id+'\')">'+svg(I.hist)+'</button>'+
        '<button class="ibtn" title="Edit" onclick="SX.editProduct(\''+p.id+'\')">'+svg(I.edit)+'</button>'+
        '<button class="ibtn" title="'+(p.archived?'Unarchive':'Archive')+'" onclick="SX.archiveProduct(\''+p.id+'\')">'+svg(I.archive)+'</button>'+
        '<button class="ibtn danger" title="Delete" onclick="SX.delProduct(\''+p.id+'\')">'+svg(I.trash)+'</button>'+
      '</div></td></tr>';
  }).join('')||'<tr><td colspan="8"><div class="empty">No products match.</div></td></tr>';
  return '<div class="section-head"><h2>Inventory</h2><div class="sp"></div>'+
    '<button class="btn sm" onclick="SX.manageSources()">'+svg(I.tag)+'Suppliers</button>'+
    '<button class="btn sm" onclick="SX.exportInventory()">'+svg(I.printr)+'Export CSV</button>'+
    '<button class="btn green sm" onclick="SX.editProduct(null)">'+svg(I.plus)+'Add product</button></div>'+
    '<div class="erp-cards">'+
      ecard('Total Products',act.length,'blue','',I.inv)+
      ecard('Inventory Cost Value',peso(totCost),'gold','at supplier cost',I.money)+
      ecard('Retail Value',peso(totSell),'green','at selling price',I.tag)+
      ecard('Potential Gross',peso(totSell-totCost),'','if all sold',I.report)+
    '</div>'+
    '<div class="erp-toolbar">'+
      '<div class="erp-search grow">'+svg(I.search)+'<input id="inv_q" placeholder="Search product, brand, supplier\u2026" value="'+esc(EUI.invSearch)+'" oninput="SX.invSearch(this.value)"></div>'+
      '<select style="max-width:180px" onchange="SX.invFilter(this.value)">'+catOpt+'</select>'+
      '<select style="max-width:160px" onchange="SX.invSource(this.value)">'+srcOpt+'</select>'+
      '<select style="max-width:150px" onchange="SX.invSort(this.value)"><option value="newest"'+s2('newest')+'>Newest</option><option value="lowcost"'+s2('lowcost')+'>Lowest Cost</option><option value="highcost"'+s2('highcost')+'>Highest Cost</option><option value="brand"'+s2('brand')+'>Brand A–Z</option></select>'+
    '</div>'+
    '<div class="tbl-wrap"><table class="etbl"><thead><tr><th>Product</th><th>Supplier</th><th>Cost</th><th>Selling</th><th>Margin</th><th>Stock</th><th>Stock Value</th><th></th></tr></thead><tbody>'+body+'</tbody></table></div>';
  function s2(x){return EUI.invSort===x?' selected':'';}
}
function ecard(lbl,val,cls,sub,ic){return '<div class="erp-card"><div class="ec-ic">'+svg(ic)+'</div><div class="ec-lbl">'+lbl+'</div><div class="ec-val '+(cls||'')+'">'+val+'</div>'+(sub?'<div class="ec-sub">'+sub+'</div>':'')+'</div>';}
function uniqueCats(){var set={};state.products.forEach(function(p){if(p.category)set[p.category]=1;});return Object.keys(set).sort();}
function stockBadge(p){var q=+p.qty||0;var cls=q<=0?'out':(q<=(+p.reorder||5)?'low':'ok');var lbl=q<=0?'Out':(q<=(+p.reorder||5)?'Low':'In stock');return '<span class="stock-badge '+cls+'">'+lbl+' · '+num(q,0)+'</span>';}

EUI.cMat=[]; EUI.cExp=null;
function ensureCost(){
  if(!EUI.cMat.length)EUI.cMat=[{productId:(activeProducts()[0]||{}).id||'',qty:1}];
  if(!EUI.cExp)EUI.cExp={labor:15000,transport:3000,delivery:2000,permit:5000,misc:2000,installation:8000,contingencyPct:0,discountPct:0,taxPct:0,profitPct:25};
}
function viewCosting2(){
  ensureCost();var x=EUI.cExp;
  return '<div class="section-head"><h2>Cost &amp; Profit Calculator</h2><div class="sp"></div>'+
    '<button class="btn sm" onclick="SX.cReset()">Reset</button>'+
    '<button class="btn sm" onclick="SX.cToPackage()">'+svg(I.builder)+'Save as package</button></div>'+
    '<div class="help-note">A full project cost — not just materials. Material cost is pulled live from inventory; labor, transport, delivery, permits, installation and other expenses are all editable. Tax, profit % and discount compute the final selling price and margin automatically.</div>'+
    '<div class="split2"><div class="card pad">'+
      '<h3 style="margin:0 0 10px;font-size:15px">Materials (from inventory)</h3><div id="c_rows">'+cMatRows()+'</div>'+
      '<button class="btn sm" style="margin-top:6px" onclick="SX.cAdd()">'+svg(I.plus)+'Add material</button>'+
      '<h3 style="margin:20px 0 10px;font-size:15px">Project expenses</h3><div class="grid-fields">'+
        ef('Labor Cost','labor')+ef('Transportation','transport')+ef('Delivery Cost','delivery')+ef('Permit Cost','permit')+
        ef('Installation Expense','installation')+ef('Miscellaneous','misc')+ef('Contingency %','contingencyPct')+
      '</div>'+
      '<h3 style="margin:18px 0 10px;font-size:15px">Pricing</h3><div class="grid-fields">'+
        ef('Tax %','taxPct')+ef('Desired Profit %','profitPct')+ef('Discount %','discountPct')+
      '</div></div>'+
      '<div class="card pad" id="c_sum" style="position:sticky;top:12px">'+cSummary()+'</div>'+
    '</div>';
  function ef(l,k){return '<label class="mini-field">'+l+'<input id="ce_'+k+'" type="number" value="'+(x[k]||0)+'" oninput="SX.cRecalc()"></label>';}
}
function cMatRows(){var prods=activeProducts();
  return EUI.cMat.map(function(r,i){
    var o=prods.map(function(p){return '<option value="'+p.id+'"'+(p.id===r.productId?' selected':'')+'>'+esc(p.name)+' — '+peso(p.cost)+'</option>';}).join('');
    return '<div class="pick-row"><select onchange="SX.cSet('+i+',\'productId\',this.value)">'+o+'</select>'+
      '<input type="number" min="0" value="'+r.qty+'" oninput="SX.cSet('+i+',\'qty\',this.value)">'+
      '<button class="ibtn danger" onclick="SX.cDel('+i+')">'+svg(I.trash)+'</button></div>';
  }).join('');
}
function readExp(){var x={};['labor','transport','delivery','permit','misc','installation','contingencyPct','discountPct','taxPct','profitPct'].forEach(function(k){var el=document.getElementById('ce_'+k);x[k]=el?(parseFloat(el.value)||0):(EUI.cExp[k]||0);});return x;}
function costEngine(mat,x){
  var material=mat.reduce(function(s,it){return s+pCost(it.productId)*(+it.qty||0);},0);
  var expenses=(+x.labor||0)+(+x.transport||0)+(+x.delivery||0)+(+x.permit||0)+(+x.misc||0)+(+x.installation||0);
  var contingency=(material+expenses)*((+x.contingencyPct||0)/100);
  var total=material+expenses+contingency;
  var tax=total*((+x.taxPct||0)/100);
  var profit=total*((+x.profitPct||0)/100);
  var selling=total+tax+profit;
  var discount=selling*((+x.discountPct||0)/100);
  var fin=selling-discount;var net=fin-total-tax;var margin=fin>0?net/fin*100:0;
  return {material:material,expenses:expenses,contingency:contingency,total:total,tax:tax,profit:profit,selling:selling,discount:discount,fin:fin,net:net,margin:margin};
}
function cSummary(){var x=document.getElementById('ce_labor')?readExp():EUI.cExp;var r=costEngine(EUI.cMat,x);
  function row(l,val,cls){return '<div class="sumrow '+(cls||'')+'"><span>'+l+'</span><b>'+val+'</b></div>';}
  var seg=function(lbl,v,c){var pct=r.total>0?v/r.total*100:0;return '<div class="cbar-seg" style="width:'+pct+'%;background:'+c+'" title="'+lbl+' '+peso(v)+'"></div>';};
  var bar='<div class="cbar">'+seg('Material',r.material,'#43C95C')+seg('Expenses',r.expenses,'#3B9AE0')+seg('Contingency',r.contingency,'#9A6BE0')+'</div>'+
    '<div class="cbar-legend"><span><i style="background:#43C95C"></i>Material</span><span><i style="background:#3B9AE0"></i>Expenses</span><span><i style="background:#9A6BE0"></i>Contingency</span></div>';
  return '<h3 style="margin:0 0 12px;font-size:15px">Cost breakdown</h3>'+bar+
    row('Total Material Cost',peso(r.material))+row('Project Expenses',peso(r.expenses))+(r.contingency?row('Contingency',peso(r.contingency)):'')+
    row('Total Project Cost',peso(r.total),'total')+
    row('Tax Amount',peso(r.tax))+row('Profit Amount',peso(r.profit))+(r.discount?row('Discount','-'+peso(r.discount)):'')+
    row('Final Selling Price',peso(r.fin),'total')+
    row('Net Profit',peso(r.net),'net')+row('Profit Margin',num(r.margin,1)+'%','net');
}

SX.cSet=function(i,k,v){EUI.cMat[i][k]=(k==='qty')?(parseFloat(v)||0):v;SX.cRecalc();};

function newQuoteForCustomer(cid){var c=custById(cid);
  return {id:'',customerId:cid||'',date:ymd(new Date()),validDays:15,items:[],labor:15000,install:8000,taxPct:0,discountPct:0,
    terms:'50% downpayment upon contract signing. 50% balance upon completion and commissioning.',
    warranty:'Panels 12 years product warranty. Inverter 5 years. Workmanship 1 year.',
    payment:'Cash, bank transfer, or in-house financing (subject to approval).',status:'Draft',created:Date.now()};
}
function quoteTotals(q){
  var sub=(q.items||[]).reduce(function(s,it){return s+(+it.unitPrice||0)*(+it.qty||0);},0);
  var labor=(+q.labor||0)+(+q.install||0);
  var base=sub+labor;
  var discount=base*((+q.discountPct||0)/100);
  var taxed=base-discount;
  var tax=taxed*((+q.taxPct||0)/100);
  var grand=taxed+tax;
  return {sub:sub,labor:labor,discount:discount,tax:tax,grand:grand};
}

  var s=EUI.invSort;
  if(s==='name')rows.sort(function(a,b){return a.name.localeCompare(b.name);});
  else if(s==='lowcost')rows.sort(function(a,b){return a.cost-b.cost;});
  else if(s==='highcost')rows.sort(function(a,b){return b.cost-a.cost;});
  else if(s==='lowsell')rows.sort(function(a,b){return a.price-b.price;});
  else if(s==='highsell')rows.sort(function(a,b){return b.price-a.price;});
  else if(s==='profit')rows.sort(function(a,b){return (b.price-b.cost)-(a.price-a.cost);});
  else if(s==='lowstock')rows.sort(function(a,b){return (+a.qty||0)-(+b.qty||0);});
  else rows.sort(function(a,b){return b.created-a.created;});

function matchInvProduct(type,detail){
  var t=(type||'').toLowerCase(),d=(detail||'').toLowerCase(),prods=state.products;
  function pick(cat,test){var c=prods.filter(function(p){return p.category===cat&&!p.archived;});var m=c.filter(test);return m[0]||null;}

function liveCost(c){if(c.productId){var p=pById(c.productId);if(p)return +p.cost||0;}return +c.unitCost||0;}
function pkgEcon(p){
  var material=p.components.reduce(function(s,c){return s+liveCost(c)*(+c.qty||0);},0);
  var x=p.expenses||{};var exp=(+x.labor||0)+(+x.transport||0)+(+x.delivery||0)+(+x.permit||0)+(+x.misc||0)+(+x.installation||0);
  var contingency=(material+exp)*((+x.contingencyPct||0)/100);
  var totalCost=material+exp+contingency;
  var selling=+p.promoPrice||+p.sellPrice||0;
  var tax=totalCost*((+x.taxPct||0)/100);
  var discount=selling*((+x.discountPct||0)/100);
  var grossProfit=selling-material;var netProfit=selling-discount-totalCost-tax;
  var margin=selling>0?netProfit/selling*100:0;
  return {material:material,exp:exp,contingency:contingency,totalCost:totalCost,selling:selling,tax:tax,discount:discount,grossProfit:grossProfit,netProfit:netProfit,margin:margin};
}
function pkgSolar(p){var w=parseInt(p.panelW)||650;var n=p.panelQty||Math.round(p.kw*1000/w);var capKw=n*w/1000;var psh=4.5,derate=0.8;
  var daily=capKw*psh*derate;var ah=(String(p.battery).match(/(\d{2,3})\s*ah/i)||[])[1];var battKwh=ah?(+ah*51.2/1000):0;
  var avgLoad=capKw*0.35;var runtime=avgLoad>0?(battKwh*0.9/avgLoad):0;
  return {capKw:capKw,panels:n,w:w,daily:daily,monthly:daily*30,annual:daily*365,psh:psh,battKwh:battKwh,runtime:runtime};
}

function viewBattery(){
  var BB=EUI.bat;var b=BB.selId?batById(BB.selId):state.batteryDB[0];if(b&&!BB.selId)BB.selId=b.id;

  function gauge(pct,label,val){var r=52,c=2*Math.PI*r,off=c*(1-pct/100);return '<div class="gauge"><svg viewBox="0 0 130 130"><circle cx="65" cy="65" r="'+r+'" class="g-bg"/><circle cx="65" cy="65" r="'+r+'" class="g-fg" style="stroke-dasharray:'+c+';stroke-dashoffset:'+off+'"/></svg><div class="g-val">'+val+'<span>'+label+'</span></div></div>';}

  return '<div class="section-head"><h2>Battery Runtime & Database</h2><div class="sp"></div>'+
      '<button class="btn sm" onclick="SX.batAdd()">'+svg(I.plus)+'Add Battery</button>'+
      '<button class="btn sm" onclick="SX.batEdit(\''+b.id+'\')">'+svg(I.edit)+'Edit</button>'+
      (cmpN>=2?'<button class="btn sm" onclick="SX.batCompare()">'+svg(I.cmp)+'Compare ('+cmpN+')</button>':'')+
      '<button class="btn sm" onclick="SX.batReport(\''+b.id+'\')">'+svg(I.spec)+'Report</button>'+
      '<button class="btn green sm" onclick="SX.batSpec(\''+b.id+'\')">'+svg(I.printr)+'Spec Sheet</button></div>'+
    '<div class="bat-grid">'+
      '<div class="bat-lib card"><div class="bl-head"><b>Battery Library</b><span class="muted sm">'+lib.length+' batteries</span></div>'+
        '<div class="inv-search sm"><span class="ic">'+svg(I.search)+'</span><input placeholder="Search battery\u2026" value="'+esc(BB.search)+'" oninput="SX.batSearch(this.value)"></div>'+
        '<select onchange="SX.batBrand(this.value)"><option value="all">All brands</option>'+Object.keys(brands).map(function(x){return '<option value="'+esc(x)+'"'+(BB.brand===x?' selected':'')+'>'+esc(x)+'</option>';}).join('')+'</select>'+
        '<div class="bat-list">'+libCards+'</div></div>'+
      '<div class="bat-main">'+
        '<div class="bat-hero card"><div class="bh-ic">'+svg(I.batt2)+'</div><div class="bh-info"><div class="bh-name">'+esc(b.name)+'</div><div class="muted">'+esc(b.brand)+' · '+esc(b.type)+' · '+esc(b.supplier||'')+'</div><div class="bh-specs"><span>'+b.voltage+'V</span><span>'+b.ah+'Ah</span><span>'+num(b.kwh,2)+'kWh</span><span>'+num(b.cycle,0)+' cycles</span><span>'+esc(b.warranty)+'</span></div></div>'+(b.productId?'<div class="bh-price"><span class="muted sm">Inventory cost</span><b class="gold">'+peso(pById(b.productId)?pById(b.productId).cost:0)+'</b></div>':'')+'</div>'+
        '<div class="bat-gauges">'+
          gauge(BB.dod,'DoD used',BB.dod+'%')+

          gauge(Math.min(100,rt/24*100),'of 24h',num(rt,1)+'h')+
        '</div>'+
        '<div class="erp-cards bat-cards">'+
          ecard('Usable Capacity',num(usable,2)+' kWh','blue','at '+BB.dod+'% DoD',I.batt2)+
          ecard('Estimated Runtime',num(rt,1)+' hrs','green','at '+num(loadW,0)+'W load',I.gauge)+
          ecard('Energy / Day',num(energyDay,1)+' kWh','','from load profile',I.bolt2)+

      '</div>'+

}

/* ---------- shared engineering engine ---------- */
var ENG={
  required:function(monthlyKwh,billingDays,psh,effPct,lossPct,offsetPct,safetyPct){var d=billingDays*psh*(effPct/100)*(1-lossPct/100);var base=d>0?monthlyKwh/d:0;return base*((offsetPct||100)/100)*(1+((safetyPct||0)/100));},
  production:function(kw,psh,lossPct){var daily=kw*psh*(1-lossPct/100);return {daily:daily,monthly:daily*30,annual:daily*365};},
  panelsFor:function(kw,watt){return Math.max(1,Math.ceil(kw*1000/(watt||550)));},
  closestPackage:function(kw){var ps=state.packagesDB.filter(function(p){return p.status!=='archived';});if(!ps.length)return null;ps=ps.slice().sort(function(a,b){return Math.abs(a.kw-kw)-Math.abs(b.kw-kw);});return ps[0];},
  bracketPackages:function(kw){var ps=state.packagesDB.filter(function(p){return p.status!=='archived';}).slice().sort(function(a,b){return a.kw-b.kw;});var lower=null,upper=null;ps.forEach(function(p){if(p.kw<=kw)lower=p;if(p.kw>=kw&&!upper)upper=p;});return {lower:lower,upper:upper,all:ps};},
  inverterFor:function(kw){var inv=state.products.filter(function(p){return p.category==='Hybrid Inverters'&&!p.archived;}).map(function(p){return {p:p,kw:parseFloat((p.name.match(/(\d+)\s*kw/i)||[])[1])||0};}).filter(function(x){return x.kw>0;}).sort(function(a,b){return a.kw-b.kw;});return {min:inv.find(function(x){return x.kw>=kw*0.85;}),rec:inv.find(function(x){return x.kw>=kw;}),over:inv.find(function(x){return x.kw>=kw*1.3;}),list:inv};},
  batteryFor:function(dailyKwh,backupH){var need=dailyKwh*(backupH/24);var bs=(state.batteryDB||[]).filter(function(b){return !b.archived;}).slice().sort(function(a,b){return a.kwh-b.kwh;});var rec=bs.find(function(b){return b.kwh*(b.dod/100)>=need;})||bs[bs.length-1];return {need:need,rec:rec,list:bs};},
  savings:function(monthlyBill,offsetPct){var ms=monthlyBill*((offsetPct||100)/100);return {monthly:ms,annual:ms*12,y5:ms*60,y10:ms*120,life:ms*300,after:Math.max(0,monthlyBill-ms)};},
  roi:function(projectCost,annualSavings){var payback=annualSavings>0?projectCost/annualSavings:0;var net=annualSavings*25-projectCost;var roi=projectCost>0?net/projectCost*100:0;return {payback:payback,roi:roi,net:net};},
  co2:function(annualKwh){return annualKwh*0.0007;},
  trees:function(annualKwh){return Math.round(annualKwh*0.0007*16.5);}
};
function svgBars(data,opt){opt=opt||{};var max=Math.max.apply(null,data.map(function(d){return d.value;}).concat([1]));var W=opt.w||320,H=opt.h||150,pad=26,bw=(W-pad)/data.length*0.62,gap=(W-pad)/data.length;
  var bars=data.map(function(d,i){var bh=(d.value/max)*(H-pad-14);var x=pad+i*gap+gap*0.19;var y=H-pad-bh;return '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+Math.max(1,bh)+'" rx="3" fill="'+(d.color||'#43C95C')+'"><title>'+esc(d.label)+': '+(opt.fmt?opt.fmt(d.value):num(d.value,0))+'</title></rect>'+
    '<text x="'+(x+bw/2)+'" y="'+(H-pad+12)+'" text-anchor="middle" font-size="9" fill="#7a8aa0">'+esc(d.label)+'</text>';}).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" class="svg-chart"><line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+W+'" y2="'+(H-pad)+'" stroke="rgba(255,255,255,.1)"/>'+bars+'</svg>';}
function svgLine(points,opt){opt=opt||{};var W=opt.w||340,H=opt.h||150,pad=28;var max=Math.max.apply(null,points.map(function(p){return p.y;}).concat([1]));var min=0;
  var pts=points.map(function(p,i){var x=pad+i/(points.length-1)*(W-pad-8);var y=H-pad-(p.y-min)/(max-min)*(H-pad-12);return [x,y];});
  var path=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1);}).join(' ');
  var area=path+' L'+pts[pts.length-1][0].toFixed(1)+' '+(H-pad)+' L'+pts[0][0].toFixed(1)+' '+(H-pad)+' Z';
  var dots=pts.map(function(p,i){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.6" fill="#43C95C"><title>'+esc(points[i].label)+': '+(opt.fmt?opt.fmt(points[i].y):num(points[i].y,0))+'</title></circle>';}).join('');
  var labs=points.map(function(p,i){return '<text x="'+pts[i][0].toFixed(1)+'" y="'+(H-pad+12)+'" text-anchor="middle" font-size="8.5" fill="#7a8aa0">'+esc(p.label)+'</text>';}).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" class="svg-chart"><path d="'+area+'" fill="rgba(67,201,92,.12)"/><path d="'+path+'" fill="none" stroke="#43C95C" stroke-width="2"/>'+dots+labs+'</svg>';}

function arrayCalc(kw,pan){var watt=pan?pan.watt:550;var panels=ENG.panelsFor(kw,watt);var installed=panels*watt/1000;

  return {panels:panels,installed:installed,area:area,rows:rows,cols:cols,rail:rail,mid:mid,end:end,lfoot:lfoot};}

function szCalc(offset){var S=EUI.sz;offset=offset||S.offset;var reqKw=ENG.required(S.monthlyKwh,S.days,S.psh,S.eff,S.loss,offset,S.safety);
  var pan=S.panelId?panById(S.panelId):(state.panelDB.slice().sort(function(a,b){return b.watt-a.watt;})[0]||null);
  var panels=ENG.panelsFor(reqKw,pan?pan.watt:600);var installed=panels*(pan?pan.watt:600)/1000;var prod=ENG.production(reqKw,S.psh,S.loss);
  var br=ENG.bracketPackages(reqKw);var inv=ENG.inverterFor(reqKw);var dailyKwh=S.monthlyKwh/Math.max(1,S.days);var batt=ENG.batteryFor(dailyKwh,S.backupH);

  return {reqKw:reqKw,pan:pan,panels:panels,installed:installed,prod:prod,br:br,inv:inv,batt:batt,sav:sav,projectCost:projectCost,roi:roi,monthlyBill:monthlyBill,dailyKwh:dailyKwh};}
function customPackage(reqKw){var S=EUI.sz;var pan=S.panelId?panById(S.panelId):(state.panelDB.slice().sort(function(a,b){return b.watt-a.watt;})[0]||null);var watt=pan?pan.watt:650;var panels=ENG.panelsFor(reqKw,watt);var inv=ENG.inverterFor(reqKw);var batt=ENG.batteryFor(S.monthlyKwh/30,S.backupH);

  var material=matPanel+matInv+matBatt+reqKw*9000;var selling=Math.round(material*1.28/1000)*1000;
  return {kw:+reqKw.toFixed(1),panels:panels,watt:watt,inverter:inv.rec?inv.rec.p.name:(Math.ceil(reqKw)+'KW Hybrid'),battery:batt.rec?batt.rec.name:'—',material:material,selling:selling,profit:selling-material};}

function billExtras(){
  var B=EUI.bill;var R=billCalc();var monthlyKwh=R.monthlyKwh;
  var pkgs=state.packagesDB.filter(function(p){return p.status!=='archived';}).slice().sort(function(a,b){return a.kw-b.kw;});
  var recId=R.pkg?R.pkg.id:'';
  var pkgRows=pkgs.map(function(p){var sol=pkgSolar(p);var off=monthlyKwh>0?Math.min(100,sol.monthly/monthlyKwh*100):0;var ms=B.monthlyBill*off/100;var price=pkgEcon(p).selling;var payback=ms>0?price/(ms*12):0;
    return '<tr class="'+(p.id===recId?'rec':'')+'"><td><b>'+esc(p.code)+'</b>'+(p.id===recId?' <span class="opt-tag">Recommended</span>':'')+'</td>'+
      '<td class="mono">'+num(sol.monthly,0)+' kWh</td>'+
      '<td class="mono">'+num(off,0)+'%</td>'+
      '<td class="mono" style="color:var(--green-2)">'+peso(ms)+'</td>'+
      '<td class="mono" style="color:var(--gold)">'+peso(price)+'</td>'+
      '<td class="mono">'+num(payback,1)+'y</td></tr>';}).join('');
  // battery comparison
  var dailyKwh=R.dailyKwh;
  var bats=(state.batteryDB||[]).filter(function(b){return !b.archived;}).slice().sort(function(a,b){return a.kwh-b.kwh;});
  // pick a representative spread (228/324/400/600-ish) — show all unique Ah, capped 8
  var seen={};var pick=[];bats.forEach(function(b){if(!seen[b.ah]){seen[b.ah]=1;pick.push(b);}});pick=pick.slice(0,8);
  var batRows=pick.map(function(b){var usable=b.kwh*(b.dod/100);var backup=R.prod.daily>0?usable/(dailyKwh/24):0;var pr=b.productId?pById(b.productId):null;var ckwh=pr&&b.kwh>0?pr.cost/b.kwh:0;
    return '<tr><td><b>'+b.ah+'Ah</b> <span class="muted sm">'+esc(b.brand)+'</span></td>'+
      '<td class="mono">'+num(b.kwh,1)+' kWh</td>'+
      '<td class="mono">'+num(usable,1)+' kWh</td>'+
      '<td class="mono">'+num(backup,1)+' h</td>'+
      '<td class="mono">'+(pr?peso(pr.cost):'—')+'</td>'+
      '<td class="mono">'+peso(ckwh)+'</td></tr>';}).join('');
  return '<h3 class="blk-h" style="margin-top:18px">Package Comparison</h3>'+
    '<div class="tbl-wrap"><table class="etbl cmp"><thead><tr><th>Package</th><th>Monthly Production</th><th>Bill Offset</th><th>Monthly Savings</th><th>Price</th><th>Payback</th></tr></thead><tbody>'+pkgRows+'</tbody></table></div>'+
    '<h3 class="blk-h" style="margin-top:18px">Battery Recommendation &amp; Comparison</h3>'+
    '<div class="help-note">Backup hours estimated against this customer\u2019s average load ('+num(dailyKwh/24,2)+' kW). Live cost &amp; cost/kWh from inventory.</div>'+
    '<div class="tbl-wrap"><table class="etbl cmp"><thead><tr><th>Battery</th><th>Capacity</th><th>Usable</th><th>Backup</th><th>Cost</th><th>Cost / kWh</th></tr></thead><tbody>'+batRows+'</tbody></table></div>';
}

  if(!q.number)q.number=nextQuoteNo();

  var commissions=(+EUI.cp.salesComm||0)+(+EUI.cp.referral||0)+(+EUI.cp.installerBonus||0)+(+EUI.cp.engineerInc||0);
  var baseCost=material+expenses+commissions;
  var contingency=baseCost*((+EUI.cp.contingencyPct||0)/100);
  var totalCost=baseCost+contingency;
  var profitPct=(opt.profitPct!=null?opt.profitPct:EUI.cp.profitPct)+(wf.profit||0);
  var selling;
  if(EUI.cp.profitMode==='package'&&opt.profitPct==null){selling=p.promoPrice||p.sellPrice||0;}
  else{selling=totalCost*(1+profitPct/100);}
  var taxPct=(+EUI.cp.taxPct||0)+(wf.tax||0);var tax=0;
  if(EUI.cp.taxMode==='inclusive'){tax=selling-selling/(1+taxPct/100);}
  else if(EUI.cp.taxMode==='exclusive'){tax=selling*taxPct/100;selling=selling+tax;}
  var discount=selling*((+EUI.cp.discountPct||0)/100);
  var finalSelling=selling-discount;
  var grossProfit=finalSelling-material;
  var netProfit=finalSelling-totalCost-(EUI.cp.taxMode==='exclusive'?tax:0)-(EUI.cp.taxMode==='inclusive'?tax:0);
  var margin=finalSelling>0?netProfit/finalSelling*100:0;
  return {material:material,labor:labor,transport:transport,expenses:expenses,commissions:commissions,contingency:contingency,baseCost:baseCost,totalCost:totalCost,selling:finalSelling,tax:tax,discount:discount,grossProfit:grossProfit,netProfit:netProfit,margin:margin,profitPct:profitPct};
}

/* ===== SULAREX ERP v9 ===== */
/* ==================================================================
   SULAREX ERP v9 — Seamless updates / no full-view refresh.
   A single context-preserving wrapper (withContext) captures the
   focused field + caret + every scroll position BEFORE a re-render
   and restores them AFTER, so Add/Edit/Save/Delete/Archive/Update
   and all live calculators keep the user exactly where they were:
   search keyword, filters, sort, scroll, selected row, open modal,
   expanded sections and active tab all persist.
   Applied globally by wrapping cascade()/cascadeView() (used by all
   CRUD) and the live-input handlers across every module.
   ================================================================== */
(function(){
  var withContext;
  var SCROLLERS=['.tbl-wrap','.cm-body','.bat-list','.sp-body','.act-feed','.mb','.nav','.notes-box','.pkg-lib','.inv-side'];
  var CARET_TYPES=/^(text|search|tel|email|url|password)$/i;

  function snapshot(){
    var ae=document.activeElement,sig=null,selS=null,selE=null,caret=false;
    if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)){
      sig=ae.getAttribute('oninput')||ae.getAttribute('onchange')||ae.getAttribute('onkeyup')||ae.id||null;
      caret=ae.tagName==='TEXTAREA'||(ae.tagName==='INPUT'&&CARET_TYPES.test(ae.type||'text'));
      if(caret){try{selS=ae.selectionStart;selE=ae.selectionEnd;}catch(e){caret=false;}}
    }
    var content=document.getElementById('content');
    var snaps=[];
    SCROLLERS.forEach(function(s){var els=document.querySelectorAll(s);for(var i=0;i<els.length;i++){if(els[i].scrollTop||els[i].scrollLeft)snaps.push([s,i,els[i].scrollTop,els[i].scrollLeft]);}});
    return {sig:sig,selS:selS,selE:selE,caret:caret,contentTop:content?content.scrollTop:0,contentLeft:content?content.scrollLeft:0,snaps:snaps,winY:window.scrollY||window.pageYOffset||0};
  }
  function restore(s){
    var content=document.getElementById('content');
    if(content){content.scrollTop=s.contentTop;content.scrollLeft=s.contentLeft;}
    s.snaps.forEach(function(sn){var els=document.querySelectorAll(sn[0]);if(els[sn[1]]){els[sn[1]].scrollTop=sn[2];els[sn[1]].scrollLeft=sn[3];}});
    if(s.winY)try{window.scrollTo(0,s.winY);}catch(e){}
    if(s.sig){
      var all=document.querySelectorAll('#content input,#content select,#content textarea,#cust-modal-ov input,#cust-modal-ov select,#cust-modal-ov textarea,.overlay input,.overlay select,.overlay textarea');
      var cand=null;
      for(var i=0;i<all.length;i++){var el=all[i];if(el.getAttribute('oninput')===s.sig||el.getAttribute('onchange')===s.sig||el.getAttribute('onkeyup')===s.sig||(el.id&&el.id===s.sig)){cand=el;break;}}
      if(cand){try{cand.focus({preventScroll:true});}catch(e){try{cand.focus();}catch(e2){}}
        if(s.caret&&s.selS!=null){try{cand.setSelectionRange(s.selS,s.selE);}catch(e){}}}
    }
  }
  // expose
  withContext=function(fn){var s=snapshot();var r;try{r=fn();}finally{ // restore on next frame so DOM is settled, plus immediately
      restore(s); if(typeof requestAnimationFrame==='function')requestAnimationFrame(function(){restore(s);});}
    return r;};

  // ---- wrap the two global re-render choke points (used by all CRUD) ----
  if(typeof cascade==='function'){var _oc=cascade;cascade=function(){var a=arguments,t=this;return withContext(function(){return _oc.apply(t,a);});};}
  if(typeof cascadeView==='function'){var _ocv=cascadeView;cascadeView=function(){var a=arguments,t=this;return withContext(function(){return _ocv.apply(t,a);});};}

  // ---- wrap the live-input / quick-update handlers that bypass cascade ----
  function wrapSX(name){var o=SX[name];if(typeof o==='function'&&!o.__wrapped){var w=function(){var a=arguments,t=this;return withContext(function(){return o.apply(t,a);});};w.__wrapped=true;SX[name]=w;}}
  [ // cost & profit
   'cpSet','cpWhatif','cpResetWhatif','cpPkg',
   // quotation
   'q7Field','q7Qty','q7Cust','q7Pkg','q7Status','q7Pay','q7UseRec','q7AddGo','q7ReplaceGo','q7Remove','q7PayAdd','q7Finalize','q7Unlock',
   // crm
   'crmSearch','crmFilter','crmPageSize','crmMore','crmAgent',
   // battery
   'batParam','batLoad','batLoadAdd','batLoadDel','batPick','batSearch','batBrand','batCmp',
   // panel
   'panParam','panSortBy','panPick','panSearch','panBrand','panWatt','panCmp','panFromPackage','panFav',
   // bill
   'billNum','billSet','billCust',
   // sizing
   'szNum','szPanel','szCust',
   // bom
   'bomQty','bomSearch','bomPkg','bomPanels','bomSet','bomFilter','bomProc',
   // inventory (search/filter/sort if present)
   'invSearch','invFilter','invSort','invCat','invSup','invStock'
  ].forEach(wrapSX);
})();

/* ===== SULAREX ERP v10 ===== */

   • Global search palette (Ctrl/Cmd+K) across customers, packages,
     quotations, inventory, schedules.
   • Per-page help strip: "what this page does" + a Next-step button.
   • Dashboard quick-action grid (common tasks, one click).
   • Lightweight tooltip system ([data-tip]) on nav + key buttons.
   • Guided workflows for the core tasks.
   Nothing is removed; existing modules are only enhanced.
   ================================================================== */
(function(){
  /* ---------- per-page guidance ---------- */

  var helpDismissed={};

  var DESC={dashboard:'Home & quick actions',erpdash:'Operations overview',crm:'Customer database (CRM)',inventory:'Product catalog & stock',packages:'Solar package database',costing:'Pricing & profit engine',quotation:'Sales quotations',bom:'Bill of materials',battery:'Battery library & runtime',panel:'Panel library & array',bill:'Bill → energy analysis',sizing:'System design tool',scheduler:'Site visits & installs',reports:'Reports & exports',appliance:'Appliance load profile',generation:'Generation yield',roof:'Roof area',roi:'ROI calculator',string:'String sizing',inverter:'Inverter sizing'};
  function enhanceNav(){var as=document.querySelectorAll('#nav a');for(var i=0;i<as.length;i++){var v=as[i].getAttribute('data-view');if(v&&DESC[v]&&!as[i].getAttribute('data-tip'))as[i].setAttribute('data-tip',DESC[v]);}}

  function setCrumb(id){var el=document.getElementById('view-crumb');if(!el)return;var grp=navGroup(id)||(CRUMB[id]||'').split('\u00b7')[0].trim();var t=(NAV.filter(function(n){return n.id===id;})[0]||{}).t||'';el.innerHTML='<span class="cr-home" data-tip="Go to Dashboard" onclick="go(\'dashboard\')">Home</span> <span class="cr-sep">\u203a</span> '+esc(grp)+' <span class="cr-sep">\u203a</span> <b>'+esc(t)+'</b>';}
  if(typeof go==='function'){var _go=go;go=function(){var r=_go.apply(this,arguments);try{injectHelp(current);enhanceNav();setCrumb(current);}catch(e){}return r;};}

  /* ---------- tooltip system ---------- */
  var tip=document.createElement('div');tip.className='tip-pop';tip.style.display='none';document.body.appendChild(tip);
  document.addEventListener('mouseover',function(e){var t=e.target.closest&&e.target.closest('[data-tip]');if(t){tip.textContent=t.getAttribute('data-tip');tip.style.display='block';var r=t.getBoundingClientRect();var x=Math.min(window.innerWidth-10,Math.max(10,r.left+r.width/2));tip.style.left=x+'px';tip.style.top=(r.bottom+8)+'px';}});

  SX.gsearchOpen=function(){var ov=document.getElementById('gsearch-ov');if(!ov){ov=document.createElement('div');ov.id='gsearch-ov';ov.className='gs-ov';ov.onclick=function(e){if(e.target===ov)SX.gsearchClose();};document.body.appendChild(ov);}

     Use-as-template / Duplicate / Edit, never auto-loaded on create.

    '<rect width="400" height="200" fill="url(#g)"/><circle cx="328" cy="46" r="30" fill="#FFD23F" opacity="0.85"/>'+

/* ===== SULAREX ERP v12 ===== */
/* ==================================================================
   SULAREX ERP v12 — Navigation restructure (workflow-driven).
   Reorganizes the sidebar into business-flow groups, merges the 10
   calculators into ONE tabbed "Solar Analysis" workspace (basic tabs
   default; advanced under Engineering Tools), and adds a consolidated
   Settings hub. Nothing is removed — every view is still reachable.
     Dashboard → CRM & Sales → Solar Analysis → Inventory →
     Operations → Reports → Settings
   ================================================================== */
(function(){
  /* ---- new workflow sidebar ---- */
  var NEWNAV=[
    {grp:'Dashboard'},
    {id:'erpdash',t:'Dashboard',ic:'dash'},
    {grp:'CRM & Sales'},
    {id:'crm',t:'Customers',ic:'users'},
    {id:'quotation',t:'Quotations',ic:'quote'},
    {id:'packages',t:'Packages',ic:'pkg'},
    {id:'costing',t:'Cost & Profit',ic:'money'},
    {grp:'Solar Analysis'},
    {id:'bill',t:'Solar Analysis',ic:'sizing'},
    {grp:'Inventory'},
    {id:'inventory',t:'Inventory',ic:'inv'},
    {id:'bom',t:'BOM Generator',ic:'bom'},
    {grp:'Operations'},
    {id:'scheduler',t:'Scheduler',ic:'cal'},
    {id:'installation',t:'Installation Guide',ic:'guide'},
    {id:'projects',t:'Project Database',ic:'db'},
    {grp:'Reports'},
    {id:'reports',t:'Reports',ic:'report'},
    {grp:'Settings'},
    {id:'settings',t:'Settings',ic:'slider'}
  ];
  NAV.length=0;Array.prototype.push.apply(NAV,NEWNAV);

  /* ---- Solar Analysis tabbed workspace ---- */
  var AN_BASIC=[['bill','Monthly Bill'],['appliance','Appliance Load'],['sizing','Solar Sizing'],['roi','ROI Calculator']];
  var AN_ENG=[['battery','Battery Runtime'],['panel','Solar Panels'],['generation','Solar Generation'],['roof','Roof Area'],['string','String Sizing'],['inverter','Inverter Sizing']];
  var AN_LABEL={};AN_BASIC.concat(AN_ENG).forEach(function(t){AN_LABEL[t[0]]=t[1];});
  function isAnalysis(id){return !!AN_LABEL[id];}
  EUI.anEng=false;
  SX.anEng=function(){EUI.anEng=!EUI.anEng;var s=document.querySelector('#v-'+current+' .an-eng');if(s)s.classList.toggle('show',EUI.anEng);var t=document.querySelector('#v-'+current+' .an-eng-toggle');if(t)t.classList.toggle('open',EUI.anEng);};
  function analysisStrip(id){
    var engActive=AN_ENG.some(function(t){return t[0]===id;});var open=EUI.anEng||engActive;
    var basic=AN_BASIC.map(function(t){return '<button class="an-tab'+(id===t[0]?' on':'')+'" onclick="go(\''+t[0]+'\')" data-tip="'+esc(t[1])+'">'+esc(t[1])+'</button>';}).join('');
    var eng=AN_ENG.map(function(t){return '<button class="an-tab'+(id===t[0]?' on':'')+'" onclick="go(\''+t[0]+'\')" data-tip="'+esc(t[1])+'">'+esc(t[1])+'</button>';}).join('');
    return '<div class="an-tabs"><div class="an-row"><span class="an-lbl">'+svg(I.gauge)+'Solar Analysis</span>'+basic+
      '<button class="an-eng-toggle'+(open?' open':'')+'" onclick="SX.anEng()" data-tip="Advanced engineering calculators">Engineering Tools '+svg(I.down)+'</button></div>'+
      '<div class="an-eng'+(open?' show':'')+'">'+eng+'</div></div>';
  }

  /* ---- title/crumb/active helpers (override for views not in NAV) ---- */
  function setHead(title,grp,page){
    var t=document.getElementById('view-title');if(t)t.textContent=title;
    var c=document.getElementById('view-crumb');if(c)c.innerHTML='<span class="cr-home" data-tip="Go to Dashboard" onclick="go(\'erpdash\')">Home</span> <span class="cr-sep">\u203a</span> '+esc(grp)+' <span class="cr-sep">\u203a</span> <b>'+esc(page)+'</b>';
  }
  function highlight(navId){var as=document.querySelectorAll('#nav a');for(var i=0;i<as.length;i++)as[i].classList.toggle('active',as[i].getAttribute('data-view')===navId);}

  /* ---- wrap go(): redirect old dashboard -> erpdash, inject analysis strip, fix heads ---- */
  var _go=go;
  go=function(id){
    if(id==='dashboard')id='erpdash';
    var r=_go.apply(this,arguments.length?[id].concat([].slice.call(arguments,1)):[id]);
    try{
      if(isAnalysis(current)){
        var view=document.getElementById('v-'+current);
        if(view&&!view.querySelector('.an-tabs')){var d=document.createElement('div');d.innerHTML=analysisStrip(current);view.insertBefore(d.firstChild,view.firstChild);}
        setHead(AN_LABEL[current],'Solar Analysis',AN_LABEL[current]);highlight('bill');
      } else if(current==='settings'){setHead('Settings','Settings','Settings');highlight('settings');}
    }catch(e){}
    return r;
  };
  SX.go=function(){return go.apply(this,arguments);};try{window.go=SX.go;}catch(e){}

  /* ---- consolidated SETTINGS hub ---- */
  state.settings=state.settings||(typeof Store!=='undefined'&&Store.get?Store.get('sularex:settings',null):null)||{
    company:{name:'SULAREX Solar Solutions',address:'Cagayan de Oro City, PH',phone:'',email:'',tin:''},
    tax:{vatPct:12,mode:'none'},labor:{ratePerKw:0,installFlat:8000}
  };
  function setSave(){if(typeof Store!=='undefined'&&Store.set)Store.set('sularex:settings',state.settings);}
  EUI.setTab=EUI.setTab||'company';
  SX.setTab=function(t){EUI.setTab=t;cascadeView('settings');};
  SX.setField=function(grp,k,v){state.settings[grp][k]=(k==='vatPct'||k==='ratePerKw'||k==='installFlat')?(parseFloat(v)||0):v;setSave();};
  SX.setMode=function(v){state.settings.tax.mode=v;setSave();cascadeView('settings');};

    var paths=series.map(function(s){var d=s.points.map(function(p,i){return (i?'L':'M')+X(p.x).toFixed(1)+' '+Y(p.y).toFixed(1);}).join(' ');return '<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2.4"/>';}).join('');
    var leg=series.map(function(s){return '<span><i style="background:'+s.color+'"></i>'+esc(s.name)+'</span>';}).join('');
    return '<svg viewBox="0 0 '+W+' '+H+'" class="svg-chart" style="width:100%"><line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-4)+'" y2="'+(H-pad)+'" stroke="var(--border-soft)"/><line x1="'+pad+'" y1="8" x2="'+pad+'" y2="'+(H-pad)+'" stroke="var(--border-soft)"/>'+paths+'</svg><div class="ln-leg">'+leg+'</div>';}

/* ===== SULAREX ERP v14 ===== */
/* ==================================================================
   SULAREX ERP v14 — Sync AI Assistant leads into Customers.
   Adds a "Sync AI Leads" button to the Customer Management header that
   pulls leads (and site-visit requests) from the AI Assistant's secure
   feed (Vercel /api/leads-feed) and creates customer records, de-duped
   by phone number. Connection details are stored locally in the portal.
   ================================================================== */
(function(){
  var LS="sularex:leadsync";
  function cfg(){ try{ return JSON.parse(localStorage.getItem(LS)||"{}"); }catch(e){ return {}; } }
  function saveCfg(c){ try{ localStorage.setItem(LS, JSON.stringify(c)); }catch(e){} }
  function digits(s){ return String(s||"").replace(/\D/g,""); }

  function mapStatus(s){
    if(/closed|won|sale/i.test(s||"")) return "Approved";
    if(/site visit|survey/i.test(s||"")) return "Site Survey Scheduled";
    if(/proposal|quotation/i.test(s||"")) return "Quotation Sent";
    return "New Inquiry";
  }

  function toCustomer(rec, baseIdx, kind){
    var when = rec.created_at ? (Date.parse(rec.created_at)||Date.now()) : Date.now();
    var pkg = rec.recommended_package || "";
    var loc = rec.location || rec.address || "";
    var name = rec.full_name || rec.contact_person || "AI Lead";
    var note = (kind==="visit" ? "Site visit request from AI Assistant" : "Imported from AI Assistant")
      + (pkg ? " · "+pkg : "")
      + (rec.preferred_date ? " · prefers "+rec.preferred_date+(rec.preferred_time?(" "+rec.preferred_time):"") : "");
    return {
      id: "CUS-"+String(baseIdx).padStart(4,"0"),
      name: name,
      phone: rec.phone || "",
      email: rec.email || "",
      location: loc, property: loc,
      bill: rec.monthly_bill ? String(rec.monthly_bill) : "",
      package: pkg,
      status: kind==="visit" ? "Site Survey Scheduled" : mapStatus(rec.status),
      agent: "",
      source: "AI Assistant",
      notes: [{ text: note, date: when, by: "AI Assistant" }],
      timeline: [{ label: (kind==="visit"?"Site visit request (AI)":"Imported from AI Assistant"), date: when, by: "AI Assistant", note: pkg }],
      created: when,
      archived: false,
      _leadId: (kind||"lead")+":"+(rec.id||rec.phone||name)
    };
  }

  SX.syncLeads=function(){
    var c=cfg();
    if(!c.url || !c.token){ SX.leadSyncConfig(); return; }
    var base=c.url.replace(/\/+$/,"");
    var url=base+"/api/leads-feed?token="+encodeURIComponent(c.token);
    toast("Syncing leads…");
    fetch(url).then(function(r){ return r.json().catch(function(){ return {ok:false,error:"Bad response ("+r.status+")"}; }); })
      .then(function(d){
        if(!d || !d.ok){ toast("Sync failed: "+((d&&d.error)||"check URL / token")); return; }
        state.customers=state.customers||[];
        var phones={}, ids={};
        state.customers.forEach(function(x){ if(x.phone) phones[digits(x.phone)]=1; if(x._leadId) ids[x._leadId]=1; });
        var added=0, base2=state.customers.length+1;
        var incoming=[].concat((d.leads||[]).map(function(l){return {r:l,kind:"lead"};}),
                               (d.visits||[]).map(function(v){return {r:v,kind:"visit"};}));
        incoming.forEach(function(it){
          var rec=it.r; var ph=digits(rec.phone);
          var lid=(it.kind)+":"+(rec.id||rec.phone||rec.full_name||rec.contact_person||"");
          if(ids[lid]) return;                 // already imported this exact record
          if(ph && phones[ph]) return;          // a customer with this phone already exists
          var cust=toCustomer(rec, base2++, it.kind);
          state.customers.unshift(cust);
          if(ph) phones[ph]=1; ids[lid]=1; added++;
        });
        if(added>0){ if(typeof saveCustomers==="function") saveCustomers(); }
        c.lastSync=Date.now(); saveCfg(c);
        toast(added>0 ? ("✓ Imported "+added+" new "+(added===1?"lead":"leads")) : "You're up to date — no new leads");
        if(current==="crm") cascadeView("crm");
      })
      .catch(function(e){ toast("Sync error — check the URL and your connection"); });
  };

  SX.leadSyncSave=function(){
    var u=(document.getElementById("ls_url")||{}).value||"";
    var t=(document.getElementById("ls_token")||{}).value||"";
    saveCfg({ url:u.trim(), token:t.trim(), lastSync:cfg().lastSync||0 });
    closeModal();
    SX.syncLeads();
  };

  SX.leadSyncConfig=function(){
    var c=cfg();
    var body='<div class="grid-fields">'+
      '<label class="mini-field">AI Assistant URL<input id="ls_url" value="'+esc(c.url||"https://sularex-assistant-two.vercel.app")+'" placeholder="https://your-app.vercel.app"></label>'+
      '<label class="mini-field">Sync token<input id="ls_token" value="'+esc(c.token||"")+'" placeholder="paste your LEADS_FEED_TOKEN"></label>'+
      '</div><div class="help-note" style="margin-top:10px">This must match the <b>LEADS_FEED_TOKEN</b> you set in Vercel. Stored only on this device.</div>';
    openModal("Connect AI Assistant", I.bolt2, body, [
      ["Save & Sync", "btn green", "SX.leadSyncSave()"]
    ]);
  };

  /* inject the Sync button into the Customers section header */
  if(VIEWS.crm){
    var _crm=VIEWS.crm;
    VIEWS.crm=function(){
      var html=_crm.apply(this,arguments);
      var syncBtn='<button class="btn sm" onclick="SX.syncLeads()" data-tip="Import leads from the AI Solar Assistant">'+svg(I.bolt2)+'Sync AI Leads</button>';
      if(html.indexOf("SX.exportCustomers")>=0 && html.indexOf("SX.syncLeads")<0){
        html=html.replace('<button class="btn sm" onclick="SX.exportCustomers', syncBtn+'<button class="btn sm" onclick="SX.exportCustomers');
      }
      return html;
    };
  }
})();



























init();

})();
